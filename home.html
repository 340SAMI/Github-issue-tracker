<body class=" mx-auto">
    <nav class="p-2 mb-[60px]">
        <div class="navbar bg-base-100 shadow-sm flex justify-between">
            <div class="flex items-center gap-2 text-[24px] font-bold">
                <img class="h-10 w-auto" src="assets/github-logo.png" alt="">
                <h2>GitHub Issues Tracker</h2>
            </div>

            <div class="flex gap-2">
                <input type="text" placeholder="Search" id="searchBox" class="input input-bordered w-24 md:w-auto" />
                <button id="searchBtn" class="search btn btn-primary"><i class="fa-solid fa-plus"></i>Search</button>
            </div>
        </div>
    </nav>

    <main class="w-10/12 mx-auto ">

        <section class="btnSection bg-base-100 p-5 gap-2.5 flex ">
            <button id="allButton" onclick="handleButtonClick('allButton')" class="btn bg-[#4A00FF] border border-gray-500 px-12 py-4 font-bold text-white text-[16px]">All</button>
            <button id="openButton" onclick="handleButtonClick('openButton')" class="btn bg-transparent border border-gray-500 px-12 py-4 font-bold text-black text-[16px]">Open</button>
            <button id="closeButton" onclick="handleButtonClick('closeButton')" class="btn bg-transparent border border-gray-500 px-12 py-4 font-bold text-black text-[16px]">Closed</button>
        </section>

        <section class="bg-base-100 mt-4 flex justify-between p-5">
            <div class="countTitle flex gap-2">
                <div class="countTitleimg h-13 w-13 p-2 bg-indigo-50 flex justify-center items-center rounded-full">
                    <img src="assets/Aperture.png" alt="" class="h-10 w-10">
                </div>
                <div class="countTitleTexts">
                    <h2 class="font-bold text-[20px]"><span>50</span> Issues</h2>
                    <p>Track and manage your project issues</p>
                </div>
            </div>

            <div class="countStatus flex items-center gap-2">
                <div class="open flex items-center justify-center gap-1">
                    <img class="" src="assets/Ellipse 2.png" alt="">

                    
                    <h3>Open</h3>
                </div>

                <div class="close flex items-center justify-center gap-1">
                    <img class="" src="assets/Ellipse 1.png" alt="">
                    <h3>Closed</h3>
                </div>
            </div>
        </section>

        <hr class="bg-gray-700">

<!-- will be dynamic -->
        <section class="bg-base-200">
            <div id="cardContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 p-4 gap-3">

        <!-- Issue Details Modal -->
        <!-- <button class="btn" onclick="issueModal.showModal()">open modal</button> -->
        <dialog id="issueModal" class="modal">
            <div class="modal-box w-full max-w-2xl">
                <!-- Title -->
                <h2 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-3">Title</h2>

                <!-- Status Badge and Meta Info -->
                <div class="flex items-center gap-2 mb-4">
                    <span id="modalStatus" class="px-3 py-1 text-sm font-semibold rounded-full">
                        Open
                    </span>
                    <span class="text-gray-500 text-sm">•</span>
                    <span id="modalMeta" class="text-gray-500 text-sm">Opened by </span>
                </div>

                <!-- Labels -->
                <div id="modalLabels" class="flex gap-2 mb-4 flex-wrap">
                    <!-- Labels  here -->
                </div>

                <hr class="my-4">

                <!-- Description -->
                <div class="mb-6">
                    <p id="modalDescription" class="text-gray-600 leading-relaxed">Issue description </p>
                </div>

                <!-- Assignee and Priority -->

                <div class="grid grid-cols-2 gap-6 mb-6">
                    <!-- Assignee -->
                    <div>
                        <h4 class="text-sm font-semibold text-gray-600 mb-2">Assignee:</h4>
                        <p id="modalAssignee" class="text-gray-800 font-semibold">Unassigned</p>
                    </div>
                    <!-- Priority -->
                    <div>
                        <h4 class="text-sm font-semibold text-gray-600 mb-2">Priority:</h4>
                        <span id="modalPriority" class="">
                            HIGH
                        </span>
                    </div>
                </div>

                <!-- Modal Actions -->
                <div class="modal-action justify-end">
                    <form method="dialog">
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
            
            <!-- Click backdrop to close -->
            <form method="dialog" class="modal-backdrop">
                <button>close</button>
            </form>
        </dialog>

        <!-- load spinner -->

        <div id="loadspinner" class="h-[60vh] flex hiden justify-center items-center">
            <span class="loading loading-spinner loading-xl"></span>
        </div>
        
    </main>

    <script src="js/home.js"></script>
